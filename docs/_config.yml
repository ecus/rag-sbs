# Configuración GitHub Pages (Jekyll)
title: 🏛️ RAG SBS · Mesa Experta Regulatoria
description: >-
  Sistema RAG agéntico v0.5 sobre normativa financiera peruana —
  SBS, BCRP, Congreso, MEF, SMV, SUNAT, INDECOPI, BIS, BID, BN, COFIDE,
  AgroBanco. 1,100 documentos, 40K chunks, citas verificables y memoria
  conversacional con filtro semántico.
theme: jekyll-theme-cayman
show_downloads: false
google_analytics:

# Renderizado Mermaid para diagramas
plugins:
  - jekyll-mermaid

# Mermaid via CDN para diagramas didácticos

# Excluir archivos no relevantes del build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# URL base — project page bajo /rag-sbs (no es user site)
baseurl: "/rag-sbs"
url: "https://ecus.github.io"

# Navegación
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

defaults:
  - scope:
      path: ""
    values:
      layout: default
