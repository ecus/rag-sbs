# =============================================================================
# Stack local — Podman Compose
# =============================================================================
# Uso:
#   make local-up      # equivale a: podman-compose up -d
#   make local-down    # equivale a: podman-compose down
#
# Notas Podman:
# - host.containers.internal = host del Mac. Lo usamos para que la API hable
#   con Ollama corriendo en tu Mac (no como container — Ollama corre nativo
#   más rápido en Apple Silicon usando Metal).
# - Puedes ejecutar Ollama dentro de un container también, pero pierde la
#   aceleración Metal. Mantenerlo nativo en host es la mejor práctica en macOS.
# =============================================================================

services:

  # -------------------------------------------------------------------------
  # API FastAPI
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-sbs-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # vault montado para que `make export-obsidian` produzca archivos
      # visibles en el host (que abrirás con Obsidian)
      - ./vault:/app/vault:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Postgres con pgvector
  # -------------------------------------------------------------------------
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: rag-sbs-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # UI Streamlit (Mesa Experta — chat + A/B + grafo + stats)
  # -------------------------------------------------------------------------
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-sbs-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
      # API_URL_PUBLIC: fallback si la UI no puede leer el Host del request.
      # Por defecto la UI deriva la IP del navegador, así que esto solo aplica
      # como red de seguridad. Si despliegas con dominio fijo, sobreescríbelo.
      API_URL_PUBLIC: ${API_URL_PUBLIC:-http://localhost:8000}
      API_PUBLIC_PORT: ${API_PUBLIC_PORT:-8000}
      PYTHONPATH: /app
    command:
      - streamlit
      - run
      - src/ui/streamlit_app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
      - --browser.gatherUsageStats=false
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Redis (cache semántico + idempotencia + embedding cache)
  # -------------------------------------------------------------------------
  redis:
    image: docker.io/redis:7-alpine
    container_name: rag-sbs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    name: rag-sbs-pgdata
